services:
  nginx:
    image: nginx:stable-alpine3.23-perl
    container_name: nginx_server
    ports:
      - "7070:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped

    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge
    external: true